<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mouse</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <img id="logo" class="logo" alt="" />
      <span class="title">Mouse</span>
      <span id="globalBadge" class="badge badge--on">ON</span>
    </div>

    <div class="section">
      <div class="section-row">
        <div class="section-label">
          <span class="label-title">Extension Active</span>
          <span class="label-sub">Globally enable or disable Mouse</span>
        </div>
        <label class="ios-toggle" aria-label="Toggle extension globally">
          <input type="checkbox" id="globalToggle" />
          <span class="track"><span class="thumb"></span></span>
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section" id="tabSection">
      <div class="section-row">
        <div class="section-label">
          <span class="label-title">Active on This Tab</span>
          <span class="label-sub">Enable or disable Mouse for this tab</span>
        </div>
        <label class="ios-toggle" aria-label="Toggle extension for this tab">
          <input type="checkbox" id="tabToggle" />
          <span class="track"><span class="thumb"></span></span>
        </label>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-label">Toggle with</span>
        <span id="shortcutHint" class="shortcut-keys"></span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section" id="tokenSection">
      <div class="section-row">
        <div class="section-label">
          <span class="label-title">Auth Token</span>
          <span class="label-sub">Required to connect to the server</span>
        </div>
      </div>
      <div class="token-row">
        <input type="password" id="tokenInput" class="token-input" placeholder="Enter token…" autocomplete="off" />
        <button id="tokenSave" class="token-save">Save</button>
      </div>
      <span id="tokenStatus" class="token-status"></span>
    </div>

    <script type="module" src="/dist/popup.js"></script>
  </body>
</html>
